# LSS Management Server — nginx reverse proxy config
# Generated by install.sh
#
# AFTER obtaining SSL certificate with certbot:
#   sudo certbot --nginx -d <DOMAIN>
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name <DOMAIN>;

    # WebSocket endpoints — pass upgrade headers through for SSH tunnels and terminal
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 1m;
    }

    # Proxy to Go server
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        client_max_body_size 1m;
    }
}

# SSL block added automatically by certbot.
# Security headers below will be added by certbot to the SSL server block.
# You can add them manually after certbot runs:
#
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
