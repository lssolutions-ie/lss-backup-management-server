{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="csrf-token" content="{{.CSRFToken}}">
<title>LSS Management Server</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="page">
  <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <h1 class="navbar-brand navbar-brand-autodark">
        <a href="/">LSS Management</a>
      </h1>
      <div class="collapse navbar-collapse" id="navbar-menu">
        <ul class="navbar-nav pt-lg-3">
          <li class="nav-item">
            <a class="nav-link" href="/"><span class="nav-link-title">Dashboard</span></a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/nodes/new"><span class="nav-link-title">Register Node</span></a>
          </li>
          {{if .User.IsSuperAdmin}}
          <li class="nav-item">
            <a class="nav-link" href="/groups"><span class="nav-link-title">Client Groups</span></a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/users"><span class="nav-link-title">Users</span></a>
          </li>
          {{end}}
          <li class="nav-item">
            <a class="nav-link" href="/settings"><span class="nav-link-title">Settings</span></a>
          </li>
        </ul>
        <div class="mt-auto p-3">
          <div class="text-muted small mb-2">Signed in as <strong>{{.User.Username}}</strong></div>
          <form action="/logout" method="POST">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <button type="submit" class="btn btn-outline-danger w-100">Log out</button>
          </form>
        </div>
      </div>
    </div>
  </aside>

  <div class="page-wrapper">
    <div class="page-body">
      <div class="container-xl py-3">
        {{if .Flash}}
        <div class="alert alert-info">{{.Flash}}</div>
        {{end}}
        {{template "content" .}}
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js" defer></script>
</body>
</html>
{{end}}
