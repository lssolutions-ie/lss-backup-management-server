{{define "content"}}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card mt-4">
      <div class="card-body">
        <h2 class="card-title text-center mb-2">Change Your Password</h2>
        <p class="text-muted text-center mb-4">You must set a new password before continuing. The default password cannot be reused.</p>

        {{if .Error}}
        <div class="alert alert-danger">{{.Error}}</div>
        {{end}}

        <form action="/settings/force-password" method="POST" autocomplete="off">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" required minlength="8" autofocus>
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" required minlength="8">
          </div>

          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100">Set Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
