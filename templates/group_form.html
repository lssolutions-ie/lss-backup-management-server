{{define "content"}}
<div class="page-header mb-3">
  <h2 class="page-title">{{if .Group}}Edit Group{{else}}New Group{{end}}</h2>
</div>

{{if .Error}}
<div class="alert alert-danger">{{.Error}}</div>
{{end}}

<div class="card">
  <div class="card-body">
    <form action="{{if .Group}}/groups/{{.Group.ID}}/edit{{else}}/groups/new{{end}}" method="POST">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

      <div class="mb-3">
        <label class="form-label">Group name</label>
        <input type="text" name="name" class="form-control"
               value="{{if .Group}}{{.Group.Name}}{{end}}" required autofocus>
      </div>

      <div class="form-footer">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/groups" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
