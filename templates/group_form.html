{{define "content"}}
<div class="page-header mb-3">
  <h2 class="page-title">{{if .Group}}Edit Client{{else}}New Client{{end}}</h2>
</div>

{{if .Error}}
<div class="alert alert-danger">{{.Error}}</div>
{{end}}

<div class="card">
  <div class="card-body">
    <form action="{{if .Group}}/groups/{{.Group.ID}}/edit{{else}}/groups/new{{end}}" method="POST">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

      <div class="mb-3">
        <label class="form-label">Client name</label>
        <input type="text" name="name" class="form-control"
               value="{{if .Group}}{{.Group.Name}}{{end}}" required autofocus>
      </div>

      {{if .User.IsSuperAdmin}}
      <div class="mb-3">
        <label class="form-label">Rank</label>
        <select name="rank" class="form-select">
          <option value="bronze" {{if and .Group (eq .Group.Rank "bronze")}}selected{{end}}>Bronze</option>
          <option value="silver" {{if and .Group (eq .Group.Rank "silver")}}selected{{end}}>Silver</option>
          <option value="gold" {{if and .Group (eq .Group.Rank "gold")}}selected{{end}}>Gold</option>
          <option value="diamond" {{if and .Group (eq .Group.Rank "diamond")}}selected{{end}}>Diamond</option>
        </select>
      </div>
      {{end}}

      <div class="form-footer">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/groups" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
