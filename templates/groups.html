{{define "content"}}
<div class="page-header mb-3">
  <div class="row g-2 align-items-center">
    <div class="col"><h2 class="page-title">Client Groups</h2></div>
    <div class="col-auto"><a href="/groups/new" class="btn btn-primary">New Group</a></div>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-vcenter">
      <thead>
        <tr>
          <th>Name</th>
          <th>Nodes</th>
          <th>Created</th>
          <th class="w-1"></th>
        </tr>
      </thead>
      <tbody>
        {{range .Groups}}
        <tr>
          <td>{{.Name}}</td>
          <td>{{.NodeCount}}</td>
          <td>{{.CreatedAt.Format "2006-01-02"}}</td>
          <td>
            <a href="/groups/{{.ID}}/edit" class="btn btn-sm">Edit</a>
            <form action="/groups/{{.ID}}/delete" method="POST" class="d-inline"
                  onsubmit="return confirm('Delete this group?');">
              <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}">
              <button type="submit" class="btn btn-sm btn-danger">Delete</button>
            </form>
          </td>
        </tr>
        {{else}}
        <tr><td colspan="4" class="text-center text-muted">No groups yet.</td></tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
{{end}}
