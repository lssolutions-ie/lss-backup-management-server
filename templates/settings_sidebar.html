{{define "settings_sidebar"}}
<div class="list-group list-group-flush">
  <div class="list-group-item text-muted small fw-bold py-1" style="font-size:0.7rem; letter-spacing:0.05em;">ACCOUNT</div>
  <a href="/settings" class="list-group-item list-group-item-action{{if eq .SettingsTab "account"}} active{{end}}">
    <i class="ti ti-user me-2"></i>Password &amp; 2FA
  </a>
  {{if .User.IsSuperAdmin}}
  <div class="list-group-item text-muted small fw-bold py-1" style="font-size:0.7rem; letter-spacing:0.05em;">SERVER</div>
  <a href="/settings/tuning" class="list-group-item list-group-item-action{{if eq .SettingsTab "tuning"}} active{{end}}">
    <i class="ti ti-adjustments me-2"></i>Server Tuning
  </a>
  <a href="/settings/backup" class="list-group-item list-group-item-action{{if eq .SettingsTab "backup"}} active{{end}}">
    <i class="ti ti-database-export me-2"></i>Backup &amp; Restore
  </a>
  <a href="/settings/smtp" class="list-group-item list-group-item-action{{if eq .SettingsTab "smtp"}} active{{end}}">
    <i class="ti ti-mail me-2"></i>SMTP
  </a>
  {{end}}
  {{if or .User.IsSuperAdmin .User.IsManager}}
  <div class="list-group-item text-muted small fw-bold py-1" style="font-size:0.7rem; letter-spacing:0.05em;">NODES</div>
  {{if .User.IsSuperAdmin}}
  <a href="/settings/node-disaster-recovery" class="list-group-item list-group-item-action{{if eq .SettingsTab "dr"}} active{{end}}">
    <i class="ti ti-shield-check me-2"></i>Disaster Recovery
  </a>
  <a href="/settings/updates" class="list-group-item list-group-item-action{{if eq .SettingsTab "updates"}} active{{end}}">
    <i class="ti ti-refresh me-2"></i>Software Updates
  </a>
  {{end}}
  <a href="/settings/pending-nodes" class="list-group-item list-group-item-action{{if eq .SettingsTab "pending"}} active{{end}}">
    <i class="ti ti-clock me-2"></i>Pending Nodes
  </a>
  {{end}}
</div>
{{end}}
