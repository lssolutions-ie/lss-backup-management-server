<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Setup · LSS Management Server</title>
<link rel="icon" href="/static/branding/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
<link rel="stylesheet" href="/static/app.css">
</head>
<body class="d-flex flex-column">
<div class="page page-center">
  <div class="container container-tight py-4">
    <div class="text-center mb-4">
      <img src="/static/branding/Logo-Main.png" alt="LSS Backup" style="max-width: 280px; height: auto;" class="mb-3">
      <p class="text-muted">First-run setup — create the superadmin account.</p>
    </div>
    <div class="card card-md">
      <div class="card-body">
        <h2 class="h2 text-center mb-4">Create superadmin</h2>
        {{if .Error}}
        <div class="alert alert-danger">{{.Error}}</div>
        {{end}}
        <form action="/setup" method="POST" autocomplete="off">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
          <div class="alert alert-info">
            The default password is <strong>lssbackuppassword</strong>. You will be required to change it and set up two-factor authentication on first login.
          </div>
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100">Create account</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js" defer></script>
</body>
</html>
