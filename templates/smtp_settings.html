{{define "content"}}
<div class="page-header mb-3">
  <h2 class="page-title">Email Server Configuration</h2>
</div>

{{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}
{{if .Success}}<div class="alert alert-success">{{.Success}}</div>{{end}}

<div class="row">
  <div class="col-md-8">
    <div class="card">
      <div class="card-body">
        <form action="/settings/smtp" method="POST" autocomplete="off">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

          <div class="row mb-3">
            <div class="col-md-8">
              <label class="form-label">SMTP Host</label>
              <input type="text" name="host" class="form-control" value="{{.SMTP.Host}}" placeholder="smtp.gmail.com">
            </div>
            <div class="col-md-4">
              <label class="form-label">Port</label>
              <input type="number" name="port" class="form-control" value="{{.SMTP.Port}}">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" value="{{.SMTP.Username}}" placeholder="user@example.com">
            </div>
            <div class="col-md-6">
              <label class="form-label">Password {{if .SMTP.PasswordEnc}}<small class="text-muted">(leave blank to keep current)</small>{{end}}</label>
              <input type="password" name="password" class="form-control" autocomplete="new-password">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">From Address</label>
              <input type="email" name="from_address" class="form-control" value="{{.SMTP.FromAddress}}" placeholder="alerts@example.com">
            </div>
            <div class="col-md-6">
              <label class="form-label">From Name</label>
              <input type="text" name="from_name" class="form-control" value="{{.SMTP.FromName}}" placeholder="LSS Backup">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-check">
              <input class="form-check-input" type="checkbox" name="use_tls" {{if .SMTP.UseTLS}}checked{{end}}>
              <span class="form-check-label">Use TLS (STARTTLS)</span>
            </label>
          </div>

          <div class="mb-3">
            <label class="form-check">
              <input class="form-check-input" type="checkbox" name="enabled" {{if .SMTP.Enabled}}checked{{end}}>
              <span class="form-check-label">Enable email notifications</span>
            </label>
          </div>

          <div class="form-footer d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Configuration</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card">
      <div class="card-body">
        <h3 class="card-title">Test Email</h3>
        <p class="text-muted">Send a test email to verify your SMTP configuration. The email will be sent to your account's email address.</p>
        <form action="/settings/smtp/test" method="POST">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
          <button type="submit" class="btn btn-outline-primary w-100">Send Test Email</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
