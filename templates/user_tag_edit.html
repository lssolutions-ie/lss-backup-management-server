{{define "content"}}
<div class="page-header mb-3">
  <div class="row g-2 align-items-center">
    <div class="col">
      <h2 class="page-title">Edit User Tag — <span class="badge" style="background-color: {{.Tag.Color}}; color: {{.Tag.TextColor}};">{{.Tag.Name}}</span></h2>
    </div>
    <div class="col-auto">
      <a href="/user-tags" class="btn">Back to User Tags</a>
    </div>
  </div>
</div>

{{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}

<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><h3 class="card-title">Tag Details</h3></div>
      <div class="card-body">
        <form action="/user-tags/{{.Tag.ID}}/edit" method="POST" autocomplete="off">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" value="{{.Tag.Name}}" required>
          </div>

          <div class="row mb-3">
            <div class="col-6">
              <label class="form-label">Background</label>
              <input type="color" name="color" id="ut-bg" class="form-control form-control-color w-100" value="{{.Tag.Color}}">
              <input type="text" id="ut-bg-hex" class="form-control form-control-sm mt-1" value="{{.Tag.Color}}" maxlength="7">
            </div>
            <div class="col-6">
              <label class="form-label">Text</label>
              <input type="color" name="text_color" id="ut-text" class="form-control form-control-color w-100" value="{{.Tag.TextColor}}">
              <input type="text" id="ut-text-hex" class="form-control form-control-sm mt-1" value="{{.Tag.TextColor}}" maxlength="7">
            </div>
          </div>

          <div class="form-footer">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/user-tags" class="btn">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  function syncColorPair(pickerId, hexId) {
    var picker = document.getElementById(pickerId);
    var hex = document.getElementById(hexId);
    if (!picker || !hex) return;
    picker.addEventListener('input', function(){ hex.value = picker.value; });
    hex.addEventListener('input', function(){
      var v = hex.value;
      if (/^#[0-9a-fA-F]{6}$/.test(v)) picker.value = v;
    });
  }
  syncColorPair('ut-bg', 'ut-bg-hex');
  syncColorPair('ut-text', 'ut-text-hex');
})();
</script>
{{end}}
